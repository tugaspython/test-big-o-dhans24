name: Autograder Pemrograman Python

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalasi Dependensi (Pytest, Radon, Timeout)
      run: |
        python -m pip install --upgrade pip
        # Tambahkan pytest-timeout di sini
        pip install pytest pytest-json-report radon pytest-timeout requests

    - name: Evaluasi Fungsionalitas dan Time Complexity (Big O)
      run: |
        pytest --timeout=2 --json-report --json-report-file=report.json

    - name: Evaluasi Cyclomatic Complexity (Struktur Kode)
      run: |
        radon cc jawaban_mahasiswa.py -j > complexity.json

    - name: Sinkronisasi Nilai ke Moodle (Middleware)
      env:
        MOODLE_TOKEN: ${{ secrets.MOODLE_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}
      run: |
        python .github/workflows/grade_poster.py
